<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Otlop</title>
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #1DA1F2;
            --bg: #f4f6f9;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px; 
        }
        
        .login-container { 
            max-width: 450px; 
            background: white; 
            margin: 60px auto; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: right; 
            border: 1px solid #edf2f7;
        }
        
        .brand-logo { 
            text-align: center; 
            font-size: 42px; 
            font-weight: 800; 
            color: var(--primary); 
            margin-bottom: 5px; 
            letter-spacing: 1px;
        }
        
        .brand-logo span { 
            color: var(--accent); 
        }
        
        h2 { 
            color: #718096; 
            text-align: center; 
            font-size: 16px; 
            margin-top: 0; 
            margin-bottom: 35px; 
            font-weight: 600;
        }
        
        .form-group { 
            margin-bottom: 22px; 
        }
        
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: var(--primary); 
            font-size: 14px; 
        }
        
        .form-group input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #cbd5e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none;
            background: #f7fafc;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus { 
            border-color: var(--accent); 
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(29, 161, 242, 0.1);
        }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 30px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s ease; 
            font-weight: bold; 
            box-shadow: 0 4px 12px rgba(13,27,42,0.2);
            margin-top: 10px;
        }
        
        .btn:hover { 
            background-color: var(--accent); 
            box-shadow: 0 4px 12px rgba(29, 161, 242, 0.3);
            transform: translateY(-1px);
        }
                        /* 📱 التحديث النهائي: إنزال وتثبيت الشريط العائم في قاع الجوال تماماً حافة بحافة 📱 */
        .bottom-nav-premium { 
            position: fixed; 
            bottom: 0px; /* 🚀 الإنزال الهندسي الموزون ليلتصق بقاع الجوال ويعزل الفراغات 🚀 */
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(20, 36, 68, 0.95); /* تعتيم ملوكي فاخر للبراند بوك الداكن */
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border); 
            padding: 12px 24px; 
            border-radius: 40px; 
            display: flex; 
            gap: 30px; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            width: 90%; 
            max-width: 450px; 
            box-sizing: border-box; 
        }
        [data-theme="light"] .bottom-nav-premium { background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 30px rgba(0,0,0,0.12); }
        .bottom-nav-link { color: var(--text-muted); text-decoration: none; font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .bottom-nav-link:hover, .bottom-nav-link.active { color: var(--accent-blue); transform: scale(1.15); }
        
        .error-alert { 
            background-color: #ffe3e3; 
            color: #dc3545; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #f5c6cb; 
            margin-bottom: 25px; 
            font-size: 14px; 
            text-align: center; 
            font-weight: 600;
        }
        
        .nav-link { 
            display: block; 
            text-align: center; 
            margin-top: 18px; 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 600;
            font-size: 14px;
        }
        
        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- إضافة اللوجو الموحد للمنصة -->
        <a href="{% url 'home' %}" style="text-decoration: none;"><div class="brand-logo">Otlo<span>p</span></div></a>
        <h2>تسجيل الدخول إلى حسابك المشترك 🔑</h2>
        
        {% if error_message %}
            <div class="error-alert">⚠️ {{ error_message }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}

            <button type="submit" class="btn">دخول الحساب 🚀</button>
        </form>
        
        <a href="{% url 'signup' %}" class="nav-link">ليس لديك حساب؟ سجل الآن مجاناً</a>
            <a href="{% url 'home' %}" class="nav-link" style="display: block; background: #edf2f7; color: #0d1b2a; padding: 12px; border-radius: 30px; text-align: center; margin-top: 15px; border: 1px solid #cbd5e0; text-decoration: none;">🏠 الرئيسية</a>

    </div>
    <!-- 📱 🌟 شريط الأيقونات الطائرة العائم الفخم المحدث المرفوع فوق بار الجوال (Premium Floating Navbar) 🌟 📱 -->
    <div class="bottom-nav-premium">
        <a href="{% url 'home' %}" class="bottom-nav-link active" title="الرئيسية">🏠</a>
        <a href="{% url 'providers_map' %}" class="bottom-nav-link" title="الخريطة لايف">🗺️</a>
        <a href="{% url 'chat_rooms_list' %}" class="bottom-nav-link" title="المحادثات">💬</a>
        <a href="{% url 'friends_list' %}" class="bottom-nav-link" title="الأصدقاء">👥</a>
        <a href="{% url 'profile' %}" class="bottom-nav-link" title="حسابي">👤</a>
    </div>

</body>
</html>
