<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محادثة {{ other_user.username }}</title>
    <style>
        :root {
            --primary: #0d1b2a;
            --secondary: #1b263b;
            --accent: #1DA1F2;
            --bg: #f4f6f9;
        }
        
        /* 💻 جعل الخلفية العامة رمادية مريحة وممتدة على اللاب توب 💻 */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #e5e7eb; /* خلفية محيطية للشاشات الكبيرة مثل واتساب ويب */
            margin: 0; 
            padding: 0; 
            height: 100vh;
            display: flex;
            justify-content: center; /* توسيط الشات تماماً في منتصف شاشة الكمبيوتر */
            align-items: center;
        }

        /* 🛡️ الحاوية العالمية الذكية: تلتصق بالموبايل وتنضغط بالملي على اللاب توب 🛡️ */
        .chat-main-wrapper {
            width: 100%;
            max-width: 650px; /* العرض الأقصى المثالي للشات على اللاب توب منعاً للمطّ */
            height: 100vh;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.08); /* ظل جانبي فخم يظهر على الشاشات الكبيرة */
        }

        /* الهيدر العلوي لغرفة الشات */
        .chat-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .chat-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .btn-back-link { color: #cbd5e0; text-decoration: none; font-size: 13px; font-weight: bold; }

        /* منطقة عرض الرسائل المرنة */
        .chat-zone {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
        }

        /* هندسة فقاعات الشات */
        .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 75%; 
            word-break: break-word; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .my-msg {
            background: var(--primary);
            color: white;
            align-self: flex-start;
            border-top-left-radius: 4px;
            text-align: right;
        }
        .other-msg {
            background: #ffffff;
            color: #2d3748;
            align-self: flex-end;
            border-top-right-radius: 4px;
            border: 1px solid #edf2f7;
            text-align: right;
        }

        /* صندوق الكتابة السفلي */
        .input-zone-container {
            background: white;
            padding: 12px 15px;
            border-top: 1px solid #edf2f7;
        }
        .chat-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input {
            flex-grow: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #cbd5e0;
            outline: none;
            font-size: 14px;
            background: #f8fafc;
            transition: 0.2s;
        }
        .chat-input:focus { border-color: var(--accent); background: white; }
        .btn-send {
            background: #2ec4b6;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46,196,182,0.2);
        }
    </style>

</head>
<body>

    <div class="chat-main-wrapper">
        
        <!-- هيدر الشات العلوي -->
        <div class="chat-header">
            <h3>💬 محادثة: {{ other_user.username }}</h3>
            <a href="{% url 'chat_rooms_list' %}" class="btn-back-link">رجوع ⬅️</a>
        </div>

        <!-- منطقة عرض الرسائل الحية للطرفين -->
        <div class="chat-zone" id="chatMessagesContainer">
            {% for msg in chat_messages %}
                <div class="bubble {% if msg.sender == request.user %}my-msg{% else %}other-msg{% endif %}">
                    {{ msg.message }}
                </div>
            {% empty %}
                <p style="text-align: center; color: #a0aec0; font-size: 12px; margin: auto;" id="empty-chat-text">لا توجد رسائل سابقة. ابدأ المحادثة الآن وسجل عروضك! 🚀</p>
            {% endfor %}
        </div>

        <!-- صندوق الإدخال السفلي الثابت -->
        <div class="input-zone-container">
            <form method="POST" class="chat-form">
                {% csrf_token %}
                <input type="text" name="message" class="chat-input" placeholder="اكتب رسالتك الخاصة هنا..." required autocomplete="off">
                <button type="submit" class="btn-send">إرسال 🚀</button>
            </form>
        </div>

    </div>

    <!-- محرك البث اللحظي لحقن الرسائل ديناميكياً بدون ريفريش وبأعلى مرونة للموبايل -->
    <script>
        const chatZone = document.getElementById('chatMessagesContainer');
        if(chatZone) chatZone.scrollTop = chatZone.scrollHeight; // نزول تلقائي للأسفل عند الفتح

        setInterval(function() {
            fetch('{% url "check_new_messages" other_user.id %}')
                .then(response => response.json())
                .then(data => {
                    if (data.new_messages.length > 0 && chatZone) {
                        // إخفاء رسالة الترحيب الافتراضية إذا كان الشات فارغاً وبدأت الرسائل في الوصول
                        const emptyText = document.getElementById('empty-chat-text');
                        if (emptyText) emptyText.style.display = 'none';

                        data.new_messages.forEach(msg => {
                            const html = `<div class="bubble other-msg">${msg.message}</div>`;
                            chatZone.insertAdjacentHTML('beforeend', html);
                        });
                        chatZone.scrollTop = chatZone.scrollHeight; // النزول اللحظي التلقائي بعد حقن الرسالة
                    }
                });
        }, 2000); // يفحص وجود رسائل جديدة كل ثانيتين بالملي!
    </script>
</body>
</html>
