<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محادثة {{ other_user.username }}</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #0d1b2a;
            --text-muted: #718096;
            --border-color: #edf2f7;
            --input-bg: #f8fafc;
        }
        [data-theme="dark"] {
            --bg: #0b132b;          
            --card-bg: #1c2541;     
            --text-main: #ffffff !important; 
            --text-muted: #cbd5e0 !important; 
            --border-color: #3a4764;
            --input-bg: #131a35 !important; 
        }
        html, body { 
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg) !important; 
            color: var(--text-main) !important; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center;
        }
        .chat-main-wrapper {
            width: 100%; max-width: 650px; height: 100vh;
            background-color: var(--bg) !important;
            display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.08);
        }
        .chat-header {
            background: #0d1b2a !important; color: white !important; padding: 15px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
        }
        /* حماية نصوص الهيدر العلوي لغرفة الشات لتظل بيضاء بالليل */
        .chat-header h3, .chat-header a { color: white !important; margin: 0; font-size: 15px; font-weight: 600; text-decoration: none; }
        .chat-zone { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background-color: var(--bg) !important; }
        .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; max-width: 75%; word-break: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.01); }
        .my-msg { background: #0d1b2a !important; color: white !important; align-self: flex-start; border-top-left-radius: 4px; text-align: right; }
        [data-theme="dark"] .my-msg { background: #1DA1F2 !important; } /* لون مميز لرسائلي بالوضع الليلي */
        .other-msg { background-color: var(--card-bg) !important; color: var(--text-main) !important; align-self: flex-end; border-top-right-radius: 4px; border: 1px solid var(--border-color); text-align: right; }
        .input-zone-container { background-color: var(--card-bg) !important; padding: 12px 15px; border-top: 1px solid var(--border-color); position: sticky; bottom: 0; }
        .chat-form { display: flex; gap: 10px; align-items: center; }
        .chat-input { flex-grow: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid var(--border-color) !important; outline: none; font-size: 14px; background-color: var(--input-bg) !important; color: var(--text-main) !important; transition: 0.2s; }
        .btn-send { background: #2ec4b6; color: white; border: none; padding: 12px 22px; border-radius: 25px; font-weight: bold; font-size: 14px; cursor: pointer; }
    </style>


</head>
<body>

    <div class="chat-main-wrapper">
        
        <!-- هيدر الشات العلوي -->
        <div class="chat-header">
            <h3>💬 محادثة: {{ other_user.username }}</h3>
            <a href="{% url 'chat_rooms_list' %}" class="btn-back-link">رجوع ⬅️</a>
        </div>

        <!-- منطقة عرض الرسائل الحية للطرفين -->
        <div class="chat-zone" id="chatMessagesContainer">
            {% for msg in chat_messages %}
                <div class="bubble {% if msg.sender == request.user %}my-msg{% else %}other-msg{% endif %}">
                    {{ msg.message }}
                </div>
            {% empty %}
                <p style="text-align: center; color: #a0aec0; font-size: 12px; margin: auto;" id="empty-chat-text">لا توجد رسائل سابقة. ابدأ المحادثة الآن وسجل عروضك! 🚀</p>
            {% endfor %}
        </div>

        <!-- صندوق الإدخال السفلي الثابت -->
        <div class="input-zone-container">
            <form method="POST" class="chat-form">
                {% csrf_token %}
                <input type="text" name="message" class="chat-input" placeholder="اكتب رسالتك الخاصة هنا..." required autocomplete="off">
                <button type="submit" class="btn-send">إرسال 🚀</button>
            </form>
        </div>

    </div>

    <!-- محرك البث اللحظي لحقن الرسائل ديناميكياً بدون ريفريش وبأعلى مرونة للموبايل -->
    <script>
        const chatZone = document.getElementById('chatMessagesContainer');
        if(chatZone) chatZone.scrollTop = chatZone.scrollHeight; // نزول تلقائي للأسفل عند الفتح

        setInterval(function() {
            fetch('{% url "check_new_messages" other_user.id %}')
                .then(response => response.json())
                .then(data => {
                    if (data.new_messages.length > 0 && chatZone) {
                        const emptyText = document.getElementById('empty-chat-text');
                        if (emptyText) emptyText.style.display = 'none';

                        // 🔔 دحرجة نغمة الشات الحية: عزف صوت تنبيه خفيف فور استقبال رسالة جديدة 🔔
                        const chatAudio = new Audio('https://mixkit.co');
                        chatAudio.play().catch(err => console.log("Audio trigger context waiting for user click"));

                        data.new_messages.forEach(msg => {
                            const html = `<div class="bubble other-msg">${msg.message}</div>`;
                            chatZone.insertAdjacentHTML('beforeend', html);
                        });
                        chatZone.scrollTop = chatZone.scrollHeight;
                    }
                });
        }, 2000);

    </script>
        <!-- 🚀 سكريبت الوراثة التلقائية الفورية للمظهر واللغات بدون أزرار 🚀 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. قراءة وتطبيق المظهر (Dark/Light) المخزن في ذاكرة الهاتف تلقائياً
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            // 2. قراءة وتطبيق اللغة والاتجاه (RTL/LTR) المخزن في ذاكرة الهاتف تلقائياً
            const savedLang = localStorage.getItem('lang') || 'ar';
            document.documentElement.dir = savedLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = savedLang;
        });
    </script>

</body>
</html>
